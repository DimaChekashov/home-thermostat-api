version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: thermostat-db
    environment:
      POSTGRES_DB: rest_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rest_api"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thermostat-network

volumes:
  postgres_data:

networks:
  thermostat-network:
    driver: bridge